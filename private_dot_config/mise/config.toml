# mise global tool list — the Linux replacement for Homebrew's CLI formulae.
#
# Mirrors ~/.config/brewfile/brewfile.txt so the same tools exist on every
# machine. Tools install into ~/.local/share/mise and are shimmed onto
# ~/.local/bin (already first on PATH), no sudo required.
#
# Apply / update:   mise install        (or: just mise-up, or chezmoi apply)
# Add a tool:       mise use -g <tool>@latest   then commit this file
#
# NOTE: most names below are mise registry short names (backed by aqua/github).
# A few tools without a registry entry are pinned to an explicit github backend
# (github:owner/repo). If `mise install` ever can't resolve a short name, switch
# that line to its github:owner/repo form.

[tools]
age        = "latest"
sops       = "latest"
atuin      = "latest"
cosign     = "latest"
gh         = "latest"
rclone     = "latest"
starship   = "latest"
node       = "lts"
just       = "latest"
zoxide     = "latest"
ripgrep    = "latest"
dust       = "latest"
fzf        = "latest"
gum        = "latest"
bat        = "latest"
jj         = "latest"
kubectl    = "latest"

# Pinned to explicit backends (no short registry name, or name collisions)
"github:superfly/flyctl"           = "latest"   # flyctl
"github:tailwindlabs/tailwindcss"  = "latest"   # tailwindcss standalone CLI
"github:PaulJuliusMartinez/jless"  = "latest"   # jless
"github:benbjohnson/litestream"    = "latest"   # litestream
"aqua:siderolabs/talos"            = "latest"   # talosctl
"aqua:fluxcd/flux2"                = "latest"   # flux

# omnictl ships inside the siderolabs/omni releases as `omnictl-<os>-<arch>`.
"github:siderolabs/omni[exe=omnictl]" = "latest"
